# Kafka KRaft single-node cluster with SASL/PLAIN and ACL authorization.
# Broker/client listener: 127.0.0.1:9094
# KRaft controller listener: 127.0.0.1:9095

process.roles=broker,controller
node.id=1
controller.quorum.voters=1@127.0.0.1:9095

listeners=SASL_PLAINTEXT://127.0.0.1:9094,CONTROLLER://127.0.0.1:9095
advertised.listeners=SASL_PLAINTEXT://127.0.0.1:9094
listener.security.protocol.map=SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:SASL_PLAINTEXT
inter.broker.listener.name=SASL_PLAINTEXT
controller.listener.names=CONTROLLER

sasl.enabled.mechanisms=PLAIN
sasl.mechanism.inter.broker.protocol=PLAIN
sasl.mechanism.controller.protocol=PLAIN
listener.name.sasl_plaintext.plain.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="broker" \
  password="broker-secret" \
  user_broker="broker-secret" \
  user_admin="admin-secret" \
  user_writer="writer-secret" \
  user_reader="reader-secret" \
  user_guest="guest-secret";
listener.name.controller.plain.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="controller" \
  password="controller-secret" \
  user_controller="controller-secret" \
  user_broker="broker-secret";

authorizer.class.name=org.apache.kafka.metadata.authorizer.StandardAuthorizer
allow.everyone.if.no.acl.found=false
super.users=User:admin;User:broker;User:controller

log.dirs=hw_2/runtime/kraft-logs-sasl-controller
num.partitions=1
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
group.initial.rebalance.delay.ms=0
auto.create.topics.enable=false

num.network.threads=3
num.io.threads=8
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

log.retention.hours=168
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000
